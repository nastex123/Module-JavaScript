<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Interactivo Pro - JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card" id="mainCard">
        <h1 id="tituloResultado">¡Bienvenido!</h1>
        <p id="mensajeCuerpo">Por favor, completa el registro para continuar.</p>
        <button id="btnAbrirModal">Comenzar Registro</button>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal">
            <h2>Datos de Usuario</h2>
            <div class="input-group">
                <label for="nombreInput">Nombre:</label>
                <input type="text" id="nombreInput" placeholder="Tu nombre">
            </div>
            <div class="input-group">
                <label for="edadInput">Edad:</label>
                <input type="text" id="edadInput" placeholder="Tu edad">
            </div>
            <div id="errorText"></div>
            <button id="btnValidar">Verificar</button>
        </div>
    </div>

    <script src="sistema_interactivo.js"></script>
</body>
</html>
