<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Product Dashboard | DummyJSON</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

    <!-- Dashboard principal -->
    <div id="dashboardContainer" class="app-container">
        <!-- Header con estadísticas y logout -->
        <header class="dashboard-header glass-card">
            <div class="logo-area">
                <i class="fas fa-boxes"></i>
                <h1>Gestión de Productos</h1>
            </div>
            <div class="stats-area" id="statsArea">
                <div class="stat-item"><i class="fas fa-cubes"></i> <span id="totalProducts">0</span> productos</div>
                <div class="stat-item"><i class="fas fa-chart-line"></i> <span id="avgPrice">0.00</span> € promedio</div>
                <div class="stat-item"><i class="fas fa-warehouse"></i> <span id="totalStock">0</span> unidades</div>
            </div>
        </header>

        <!-- Barra de acciones -->
        <div class="action-bar glass-card">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar por nombre o descripción...">
            </div>
            <div class="filter-box">
                <i class="fas fa-filter"></i>
                <select id="categoryFilter">
                    <option value="all">Todas las categorías</option>
                </select>
            </div>
            <div class="action-buttons">
                <button id="addProductBtn" class="btn-primary"><i class="fas fa-plus"></i> Nuevo producto</button>
                <button id="resetApiBtn" class="btn-secondary"><i class="fas fa-sync-alt"></i> Reiniciar desde API</button>
            </div>
        </div>

        <!-- Grid de productos -->
        <div id="productsContainer" class="products-grid">
            <div class="loading-spinner" id="loadingSpinner">
                <i class="fas fa-spinner fa-pulse"></i> Cargando productos...
            </div>
        </div>

        <!-- Sección de listas -->
        <div class="lists-section glass-card">
            <div class="lists-header">
                <h3><i class="fas fa-list-ul"></i> Mis listas</h3>
                <button id="createEmptyListBtn" class="btn-secondary btn-sm"><i class="fas fa-plus"></i> Crear lista vacía</button>
            </div>
            <div id="listsContainer" class="lists-grid"></div>
        </div>
    </div>

    <!-- ===================== MODALES ===================== -->
    <!-- Modal para agregar/editar producto -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal glass-card">
            <div class="modal-header">
                <h2 id="modalTitle">Agregar Producto</h2>
                <button id="closeModalBtn" class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label for="title"><i class="fas fa-tag"></i> Título *</label>
                    <input type="text" id="title" placeholder="Nombre del producto" required>
                </div>
                <div class="form-group">
                    <label for="description"><i class="fas fa-align-left"></i> Descripción</label>
                    <textarea id="description" rows="3" placeholder="Descripción detallada"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="price"><i class="fas fa-dollar-sign"></i> Precio *</label>
                        <input type="number" id="price" step="0.01" min="0" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="stock"><i class="fas fa-boxes"></i> Stock *</label>
                        <input type="number" id="stock" step="1" min="0" placeholder="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="category"><i class="fas fa-folder"></i> Categoría *</label>
                    <input type="text" id="category" placeholder="Ej: Electrónica" required>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancelModalBtn" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal para listas -->
    <div id="listModalOverlay" class="modal-overlay hidden">
        <div class="modal glass-card" style="max-width: 450px;">
            <div class="modal-header">
                <h2><i class="fas fa-list"></i> Añadir a lista</h2>
                <button id="closeListModalBtn" class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div id="listModalContent"></div>
        </div>
    </div>

    <!-- Toast notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="gestion_datos.js"></script>
</body>

</html>
